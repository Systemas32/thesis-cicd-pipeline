name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: systemas32
  API_GATEWAY_IMAGE: systemas32/api-gateway
  USER_SERVICE_IMAGE: systemas32/user-service

jobs:
  # Job 1: Unit tests
  # Runs the per-service pytest suites for api-gateway and user-service.
  # Each suite is invoked with the appropriate service on PYTHONPATH so the
  # two `app.main` modules do not collide in the Python import cache.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install service dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r microservices/api-gateway/requirements.txt
          pip install -r microservices/user-service/requirements.txt

      - name: Run api-gateway unit tests
        env:
          PYTHONPATH: microservices/api-gateway
        run: pytest tests/unit/test_api_gateway.py -v

      - name: Run user-service unit tests
        env:
          PYTHONPATH: microservices/user-service
        run: pytest tests/unit/test_user_service.py -v

  # Job 2: Static check of the smoke suite
  # Syntax-checks the Robot Framework smoke tests so a broken suite fails fast
  # before any images are built. Deploy, health-check, real smoke execution and
  # rollback all run locally against Minikube via scripts/run-scenario.sh and
  # are therefore not part of this workflow.
  smoke-suite-syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/smoke/requirements.txt

      - name: Syntax-check Robot Framework smoke suite
        run: robot --dryrun tests/smoke/smoke_tests.robot

  # Job 3: Build and push images
  # Builds the production images for both microservices and pushes them to
  # Docker Hub. Runs only after both validation jobs pass.
  build-and-push-images:
    needs: [unit-tests, smoke-suite-syntax-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v7
        with:
          context: ./microservices/api-gateway
          push: true
          tags: |
            ${{ env.API_GATEWAY_IMAGE }}:latest
            ${{ env.API_GATEWAY_IMAGE }}:${{ github.sha }}

      - name: Build and push User Service
        uses: docker/build-push-action@v7
        with:
          context: ./microservices/user-service
          push: true
          tags: |
            ${{ env.USER_SERVICE_IMAGE }}:latest
            ${{ env.USER_SERVICE_IMAGE }}:${{ github.sha }}
