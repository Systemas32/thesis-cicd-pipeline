name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_HUB_USERNAME: systemas32
  API_GATEWAY_IMAGE: systemas32/api-gateway
  USER_SERVICE_IMAGE: systemas32/user-service

jobs:
  # Job 1: Build and test
  # Validates the Python services and the Robot Framework smoke suite.
  # Deploy, health-check and rollback run locally against Minikube and are
  # therefore not part of this workflow.
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/smoke/requirements.txt
          pip install pytest

      - name: Run unit tests (if any exist)
        run: |
          if ls tests/unit/test_*.py >/dev/null 2>&1; then
            pytest tests/unit -v
          else
            echo "No unit tests present - skipping."
          fi

      - name: Validate Robot Framework smoke suite
        run: robot --dryrun tests/smoke/smoke_tests.robot

  # Job 2: Build and push images
  # Builds the production images for both microservices and pushes them to
  # Docker Hub. Runs only after the tests pass.
  build-and-push-images:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./microservices/api-gateway
          push: true
          tags: |
            ${{ env.API_GATEWAY_IMAGE }}:latest
            ${{ env.API_GATEWAY_IMAGE }}:${{ github.sha }}

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./microservices/user-service
          push: true
          tags: |
            ${{ env.USER_SERVICE_IMAGE }}:latest
            ${{ env.USER_SERVICE_IMAGE }}:${{ github.sha }}
