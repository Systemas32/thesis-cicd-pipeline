apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-api-gateway
  labels:
    app: api-gateway
    release: {{ .Release.Name }}
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: 5000
      nodePort: {{ .Values.apiGateway.service.nodePort }}
      protocol: TCP
      name: http
  selector:
    app: api-gateway
    release: {{ .Release.Name }}
